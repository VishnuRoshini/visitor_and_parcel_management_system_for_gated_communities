<h2 mat-dialog-title>
  <mat-icon>inventory_2</mat-icon>
  Log New Parcel
</h2>

<mat-dialog-content>
  <form [formGroup]="parcelForm" class="parcel-form">
    <mat-form-field appearance="outline">
      <mat-label>Recipient (Resident)</mat-label>
      <mat-select formControlName="resident_id" placeholder="Select recipient">
        <mat-option *ngFor="let resident of residents" [value]="resident.id">
          {{ resident.name }}
        </mat-option>
      </mat-select>
      <mat-icon matPrefix>home</mat-icon>
      <mat-error *ngIf="parcelForm.get('resident_id')?.invalid">
        {{ getErrorMessage('resident_id') }}
      </mat-error>
      <mat-hint *ngIf="isLoadingResidents">Loading residents...</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Sender / Source</mat-label>
      <input matInput formControlName="name" placeholder="Enter sender name or courier service">
      <mat-icon matPrefix>local_shipping</mat-icon>
      <mat-error *ngIf="parcelForm.get('name')?.invalid">
        {{ getErrorMessage('name') }}
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea 
        matInput 
        formControlName="purpose_or_description" 
        placeholder="Package description (optional)"
        rows="3">
      </textarea>
      <mat-icon matPrefix>description</mat-icon>
      <mat-error *ngIf="parcelForm.get('purpose_or_description')?.invalid">
        {{ getErrorMessage('purpose_or_description') }}
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading">Cancel</button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="onSubmit()" 
    [disabled]="isLoading || isLoadingResidents">
    <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
    <span *ngIf="!isLoading">Log Parcel</span>
  </button>
</mat-dialog-actions>
