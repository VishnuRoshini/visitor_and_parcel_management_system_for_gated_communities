<div class="page-container">
  <mat-card>
    <div class="card-header">
      <h2>
        <mat-icon>inventory_2</mat-icon>
        Parcel Log
      </h2>
      <button mat-raised-button color="primary" (click)="openAddDialog()">
        <mat-icon>add</mat-icon>
        Log New Parcel
      </button>
    </div>

    <div class="card-content">
      <app-loading-spinner *ngIf="isLoading" message="Loading parcels..."></app-loading-spinner>

      <ng-container *ngIf="!isLoading">
        <app-empty-state
          *ngIf="dataSource.data.length === 0"
          icon="inventory_2"
          title="No Parcels"
          message="No parcel records found. Start by logging a new parcel.">
        </app-empty-state>

        <div class="table-container" *ngIf="dataSource.data.length > 0">
          <table mat-table [dataSource]="dataSource" class="parcel-table">
            <!-- ID Column -->
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>ID</th>
              <td mat-cell *matCellDef="let parcel">#{{ parcel.id }}</td>
            </ng-container>

            <!-- Sender Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Sender/Source</th>
              <td mat-cell *matCellDef="let parcel">{{ parcel.name }}</td>
            </ng-container>

            <!-- Resident Column -->
            <ng-container matColumnDef="resident_name">
              <th mat-header-cell *matHeaderCellDef>Recipient</th>
              <td mat-cell *matCellDef="let parcel">{{ parcel.resident_name }}</td>
            </ng-container>

            <!-- Description Column -->
            <ng-container matColumnDef="purpose_or_description">
              <th mat-header-cell *matHeaderCellDef>Description</th>
              <td mat-cell *matCellDef="let parcel">
                {{ parcel.purpose_or_description || '-' }}
              </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let parcel">
                <app-status-badge [status]="parcel.status"></app-status-badge>
              </td>
            </ng-container>

            <!-- Created At Column -->
            <ng-container matColumnDef="created_at">
              <th mat-header-cell *matHeaderCellDef>Received At</th>
              <td mat-cell *matCellDef="let parcel">
                {{ formatDate(parcel.created_at) }}
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let parcel">
                <ng-container *ngIf="getNextStatuses(parcel.status).length > 0">
                  <button 
                    mat-icon-button 
                    [matMenuTriggerFor]="statusMenu"
                    matTooltip="Update Status">
                    <mat-icon>more_vert</mat-icon>
                  </button>
                  <mat-menu #statusMenu="matMenu">
                    <button 
                      mat-menu-item 
                      *ngFor="let status of getNextStatuses(parcel.status)"
                      (click)="updateStatus(parcel, status)">
                      <mat-icon>chevron_right</mat-icon>
                      {{ status }}
                    </button>
                  </mat-menu>
                </ng-container>
                <span *ngIf="getNextStatuses(parcel.status).length === 0" class="text-secondary">
                  -
                </span>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <mat-paginator
            [length]="totalRecords"
            [pageSize]="pageSize"
            [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 25, 50]"
            (page)="onPageChange($event)"
            showFirstLastButtons>
          </mat-paginator>
        </div>
      </ng-container>
    </div>
  </mat-card>
</div>
