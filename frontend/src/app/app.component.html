<ng-container *ngIf="!isLoggedIn">
  <router-outlet></router-outlet>
</ng-container>

<ng-container *ngIf="isLoggedIn">
  <div class="app-container" [class.sidebar-collapsed]="!isSidebarOpen">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <mat-icon>apartment</mat-icon>
          <span class="logo-text" *ngIf="isSidebarOpen">VPM System</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a *ngFor="let item of filteredNavItems"
           [routerLink]="item.route"
           routerLinkActive="active"
           class="nav-item"
           [matTooltip]="!isSidebarOpen ? item.label : ''"
           matTooltipPosition="right">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span class="nav-label" *ngIf="isSidebarOpen">{{ item.label }}</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info" *ngIf="isSidebarOpen && currentUser">
          <mat-icon>account_circle</mat-icon>
          <div class="user-details">
            <span class="user-name">{{ currentUser.name }}</span>
            <span class="user-role" [ngClass]="getRoleBadgeClass()">{{ currentUser.role }}</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button mat-icon-button (click)="toggleSidebar()">
            <mat-icon>{{ isSidebarOpen ? 'menu_open' : 'menu' }}</mat-icon>
          </button>
          <h1 class="page-title">{{ pageTitle }}</h1>
        </div>

        <div class="topbar-right">
          <span class="welcome-text" *ngIf="currentUser">
            Welcome, <strong>{{ currentUser.name }}</strong>
          </span>
          
          <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-avatar">
            <mat-icon>account_circle</mat-icon>
          </button>
          
          <mat-menu #userMenu="matMenu" xPosition="before">
            <div class="menu-header">
              <strong>{{ currentUser?.name }}</strong>
              <span class="menu-role" [ngClass]="getRoleBadgeClass()">{{ currentUser?.role }}</span>
            </div>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="openChangePasswordDialog()">
              <mat-icon>lock</mat-icon>
              <span>Change Password</span>
            </button>
            <button mat-menu-item (click)="open2FASettingsDialog()">
              <mat-icon>security</mat-icon>
              <span>Two-Factor Auth</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="logoutAllSessions()">
              <mat-icon>devices</mat-icon>
              <span>Logout All Sessions</span>
            </button>
            <button mat-menu-item (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        </div>
      </header>

      <!-- Page Content -->
      <main class="content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-container>
