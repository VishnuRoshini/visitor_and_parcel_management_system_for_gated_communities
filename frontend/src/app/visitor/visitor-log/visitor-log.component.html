<div class="page-container">
  <mat-card>
    <div class="card-header">
      <h2>
        <mat-icon>people</mat-icon>
        Visitor Log
      </h2>
      <button mat-raised-button color="primary" (click)="openAddDialog()">
        <mat-icon>add</mat-icon>
        Log New Visitor
      </button>
    </div>

    <div class="card-content">
      <app-loading-spinner *ngIf="isLoading" message="Loading visitors..."></app-loading-spinner>

      <ng-container *ngIf="!isLoading">
        <app-empty-state
          *ngIf="dataSource.data.length === 0"
          icon="people_outline"
          title="No Visitors"
          message="No visitor records found. Start by logging a new visitor.">
        </app-empty-state>

        <div class="table-container" *ngIf="dataSource.data.length > 0">
          <table mat-table [dataSource]="dataSource" class="visitor-table">
            <!-- ID Column -->
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>ID</th>
              <td mat-cell *matCellDef="let visitor">#{{ visitor.id }}</td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Visitor Name</th>
              <td mat-cell *matCellDef="let visitor">{{ visitor.name }}</td>
            </ng-container>

            <!-- Resident Column -->
            <ng-container matColumnDef="resident_name">
              <th mat-header-cell *matHeaderCellDef>Resident</th>
              <td mat-cell *matCellDef="let visitor">{{ visitor.resident_name }}</td>
            </ng-container>

            <!-- Purpose Column -->
            <ng-container matColumnDef="purpose_or_description">
              <th mat-header-cell *matHeaderCellDef>Purpose</th>
              <td mat-cell *matCellDef="let visitor">
                {{ visitor.purpose_or_description || '-' }}
              </td>
            </ng-container>

            <!-- Vehicle Column -->
            <ng-container matColumnDef="vehicle_details">
              <th mat-header-cell *matHeaderCellDef>Vehicle</th>
              <td mat-cell *matCellDef="let visitor">
                {{ visitor.vehicle_details || '-' }}
              </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let visitor">
                <app-status-badge [status]="visitor.status"></app-status-badge>
              </td>
            </ng-container>

            <!-- Created At Column -->
            <ng-container matColumnDef="created_at">
              <th mat-header-cell *matHeaderCellDef>Logged At</th>
              <td mat-cell *matCellDef="let visitor">
                {{ formatDate(visitor.created_at) }}
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let visitor">
                <ng-container *ngIf="getNextStatuses(visitor.status).length > 0">
                  <button 
                    mat-icon-button 
                    [matMenuTriggerFor]="statusMenu"
                    matTooltip="Update Status">
                    <mat-icon>more_vert</mat-icon>
                  </button>
                  <mat-menu #statusMenu="matMenu">
                    <button 
                      mat-menu-item 
                      *ngFor="let status of getNextStatuses(visitor.status)"
                      (click)="updateStatus(visitor, status)">
                      <mat-icon>chevron_right</mat-icon>
                      {{ status }}
                    </button>
                  </mat-menu>
                </ng-container>
                <span *ngIf="getNextStatuses(visitor.status).length === 0" class="text-secondary">
                  -
                </span>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <mat-paginator
            [length]="totalRecords"
            [pageSize]="pageSize"
            [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 25, 50]"
            (page)="onPageChange($event)"
            showFirstLastButtons>
          </mat-paginator>
        </div>
      </ng-container>
    </div>
  </mat-card>
</div>
